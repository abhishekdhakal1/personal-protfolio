<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Abhishek's Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #06b6d4;
            --primary-dark: #0891b2;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .neon-border {
            position: relative;
            background: linear-gradient(45deg, #06b6d4, #3b82f6, #8b5cf6);
            padding: 1px;
            border-radius: 0.5rem;
        }
        
        .neon-border::before {
            content: '';
            position: absolute;
            inset: 1px;
            background: #0f172a;
            border-radius: 0.375rem;
            z-index: -1;
        }
        
        .sidebar-item {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .sidebar-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.1), transparent);
            transition: left 0.3s ease;
        }
        
        .sidebar-item:hover::before {
            left: 100%;
        }
        
        .data-row {
            transition: all 0.2s ease;
        }
        
        .data-row:hover {
            background: rgba(6, 182, 212, 0.05);
            transform: translateX(4px);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="loginScreen" class="fixed inset-0 flex items-center justify-center z-50">
            <div class="glass-card p-8 rounded-2xl max-w-md w-full mx-4 neon-border">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-br from-cyan-500 to-blue-500 rounded-xl flex items-center justify-center">
                        <i class="fas fa-microchip text-white text-2xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-white mb-2">Admin Panel</h1>
                    <p class="text-gray-400">Portfolio Management System</p>
                </div>
                
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                        <input type="text" id="username" required
                               class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input type="password" id="password" required
                               class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 transition-all">
                    </div>
                    
                    <button type="submit" id="loginBtn"
                            class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-semibold py-3 rounded-lg hover:from-cyan-600 hover:to-blue-600 transition-all duration-300 transform hover:scale-[1.02]">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Sign In
                    </button>
                </form>
                
                <div id="loginError" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-400 text-sm"></div>
            </div>
        </div>
        
        <!-- Dashboard (Hidden by default) -->
        <div id="dashboard" class="hidden">
            <!-- Sidebar -->
            <div class="fixed left-0 top-0 h-64 w-64 glass-card border-r border-gray-700 z-40">
                <div class="p-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-500 rounded-lg flex items-center justify-center">
                            <i class="fas fa-microchip text-white"></i>
                        </div>
                        <div>
                            <h2 class="text-white font-bold">Admin</h2>
                            <p class="text-gray-400 text-sm">Portfolio CMS</p>
                        </div>
                    </div>
                </div>
                
                <nav class="px-4 pb-4">
                    <a href="#profile" class="sidebar-item block px-4 py-3 text-gray-300 hover:text-white rounded-lg mb-2">
                        <i class="fas fa-user mr-3"></i>Profile
                    </a>
                    <a href="#projects" class="sidebar-item block px-4 py-3 text-gray-300 hover:text-white rounded-lg mb-2">
                        <i class="fas fa-project-diagram mr-3"></i>Projects
                    </a>
                    <a href="#skills" class="sidebar-item block px-4 py-3 text-gray-300 hover:text-white rounded-lg mb-2">
                        <i class="fas fa-cogs mr-3"></i>Skills
                    </a>
                    <a href="#messages" class="sidebar-item block px-4 py-3 text-gray-300 hover:text-white rounded-lg mb-2">
                        <i class="fas fa-envelope mr-3"></i>Messages
                    </a>
                    <button id="logoutBtn" class="sidebar-item w-full text-left px-4 py-3 text-red-400 hover:text-red-300 rounded-lg">
                        <i class="fas fa-sign-out-alt mr-3"></i>Logout
                    </button>
                </nav>
            </div>
            
            <!-- Main Content -->
            <div class="ml-64 p-6">
                <!-- Header -->
                <header class="glass-card rounded-xl p-6 mb-6 neon-border">
                    <div class="flex items-center justify-between">
                        <div>
                            <h1 class="text-2xl font-bold text-white">Portfolio Dashboard</h1>
                            <p class="text-gray-400">Manage your portfolio content</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-gray-400">Welcome back, <span id="adminName" class="text-cyan-400 font-semibold">Admin</span></span>
                            <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-emerald-500 rounded-full flex items-center justify-center">
                                <i class="fas fa-check text-white text-sm"></i>
                            </div>
                        </div>
                    </div>
                </header>
                
                <!-- Content Sections -->
                <div id="contentArea">
                    <!-- Profile Section -->
                    <div id="profileSection" class="content-section hidden">
                        <div class="glass-card rounded-xl p-6 neon-border">
                            <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-3">
                                <i class="fas fa-user text-cyan-400"></i>
                                Profile Management
                            </h2>
                            
                            <form id="profileForm" class="space-y-6">
                                <div class="grid md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-300 mb-2">Name</label>
                                        <input type="text" id="profileName" 
                                               class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-cyan-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                                        <input type="email" id="profileEmail" 
                                               class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-cyan-500">
                                    </div>
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-medium text-gray-300 mb-2">Bio</label>
                                    <textarea id="profileBio" rows="4" 
                                              class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-cyan-500"></textarea>
                                </div>
                                
                                <button type="submit" 
                                        class="bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-semibold px-6 py-3 rounded-lg hover:from-cyan-600 hover:to-blue-600 transition-all">
                                    <i class="fas fa-save mr-2"></i>Save Profile
                                </button>
                            </form>
                        </div>
                    </div>
                    
                    <!-- Messages Section -->
                    <div id="messagesSection" class="content-section">
                        <div class="glass-card rounded-xl p-6 neon-border">
                            <div class="flex items-center justify-between mb-6">
                                <h2 class="text-xl font-bold text-white flex items-center gap-3">
                                    <i class="fas fa-envelope text-cyan-400"></i>
                                    Messages
                                    <span id="messageCount" class="bg-cyan-500 text-white text-sm px-2 py-1 rounded-full">0</span>
                                </h2>
                                <button id="refreshMessages" class="text-cyan-400 hover:text-cyan-300">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                            </div>
                            
                            <div id="messagesList" class="space-y-4">
                                <!-- Messages will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let authToken = localStorage.getItem('adminToken');
        
        // Check authentication on load
        if (authToken) {
            showDashboard();
        }
        
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Signing in...';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    showDashboard();
                } else {
                    errorDiv.textContent = data.error;
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Login failed. Please try again.';
                errorDiv.classList.remove('hidden');
            }
            
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Sign In';
            loginBtn.disabled = false;
        });
        
        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            showLoginScreen();
        });
        
        // Navigation handlers
        document.querySelectorAll('.sidebar-item[href^="#"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.getAttribute('href').substring(1);
                showSection(section);
            });
        });
        
        // Profile form handler
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('profileName').value,
                email: document.getElementById('profileEmail').value,
                bio: document.getElementById('profileBio').value
            };
            
            try {
                const response = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                if (data.success) {
                    showNotification('Profile updated successfully!', 'success');
                }
            } catch (error) {
                showNotification('Failed to update profile', 'error');
            }
        });
        
        // Load messages
        document.getElementById('refreshMessages').addEventListener('click', loadMessages);
        
        function showLoginScreen() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }
        
        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadMessages();
        }
        
        function showSection(section) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(section + 'Section').classList.remove('hidden');
        }
        
        async function loadMessages() {
            try {
                const response = await fetch('/api/messages', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const data = await response.json();
                
                if (data.messages) {
                    document.getElementById('messageCount').textContent = data.messages.length;
                    
                    const messagesList = document.getElementById('messagesList');
                    messagesList.innerHTML = data.messages.map(msg => `
                        <div class="data-row glass-card p-4 rounded-lg border border-gray-700">
                            <div class="flex items-start justify-between">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3 mb-2">
                                        <span class="text-white font-semibold">${msg.name}</span>
                                        <span class="text-gray-400 text-sm">${msg.email}</span>
                                        ${msg.read ? '' : '<span class="bg-cyan-500 text-white text-xs px-2 py-1 rounded-full">New</span>'}
                                    </div>
                                    <p class="text-gray-300 text-sm">${msg.message}</p>
                                    <p class="text-gray-500 text-xs mt-2">${new Date(msg.createdAt).toLocaleString()}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="deleteMessage('${msg._id}')" class="text-red-400 hover:text-red-300">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Failed to load messages:', error);
            }
        }
        
        async function deleteMessage(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;
            
            try {
                const response = await fetch(`/api/messages/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const data = await response.json();
                if (data.success) {
                    loadMessages();
                    showNotification('Message deleted successfully', 'success');
                }
            } catch (error) {
                showNotification('Failed to delete message', 'error');
            }
        }
        
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 p-4 rounded-lg glass-card border z-50 ${
                type === 'success' ? 'border-green-500 text-green-400' : 
                type === 'error' ? 'border-red-500 text-red-400' : 
                'border-cyan-500 text-cyan-400'
            }`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
    </script>
</body>
</html>
